# Frontend: build the image and push it to ECR.
name: Build Frontend

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-north-1
  ECR_REPO_PREFIX: fastapi-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build once, push to each environment's repo
        run: |
          docker build -t fastapi-frontend ./frontend
          for ENV in dev staging prod; do
            IMAGE=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-$ENV:latest
            docker tag fastapi-frontend $IMAGE
            docker push $IMAGE
          done
